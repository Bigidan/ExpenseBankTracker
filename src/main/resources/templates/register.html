<!DOCTYPE html>
<html lang="uk-UA">
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: #34495e;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            color: white;
            border: none;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="box">

    <h2>Register</h2>

    <form method="post" action="/register">
        <input type="text" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Register</button>
    </form>

    <a href="/login">Login</a>

</div>
</body>
</html>
